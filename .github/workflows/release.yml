name: Release

# Tag → 3-platform matrix build → boot-gated artifacts → DRAFT GitHub Release.
#   git tag v0.1.0-beta.1 && git push origin v0.1.0-beta.1
# Beta/rc tags (any tag containing '-') are marked prerelease automatically.
#
# Every job freezes the Python backend (PyInstaller) and SMOKE-BOOTS it against
# /presets before packaging — an installer whose backend can't start never ships.
#
# Code signing is READY but optional: builds are unsigned until the repo secrets
# below exist, at which point the same workflow produces signed artifacts.
#   mac:  CSC_LINK, CSC_KEY_PASSWORD, APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID
#   win:  WIN_CSC_LINK, WIN_CSC_KEY_PASSWORD
# See docs/RELEASING.md for the full runbook.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # create/update the GitHub Release

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # `artifacts` = uploaded to the workflow run (everything, for debugging).
          # `release_files` = attached to the GitHub Release (headline downloads
          # only — the release page stays scannable: one mac, one windows file
          # plus tiny auto-update metadata). Mac zip/latest-mac.yml return when
          # signing lands (mac auto-update requires signed builds); Linux stays
          # artifact-only until requested.
          - os: macos-latest
            freeze: bash build_backend_mac.sh
            backend_bin: ./pyi-dist/lore-backend/lore-backend
            dist: npm run dist:mac
            artifacts: |
              desktop/dist/*.dmg
              desktop/dist/*.zip
              desktop/dist/latest-mac.yml
              desktop/dist/*.blockmap
            release_files: |
              desktop/dist/*.dmg
          - os: windows-latest
            freeze: bash build_backend.sh
            backend_bin: ./pyi-dist/lore-backend/lore-backend.exe
            dist: npm run dist
            artifacts: |
              desktop/dist/*.exe
              desktop/dist/latest.yml
              desktop/dist/*.blockmap
            release_files: |
              desktop/dist/*.exe
              desktop/dist/latest.yml
          - os: ubuntu-latest
            freeze: bash build_backend_mac.sh
            backend_bin: ./pyi-dist/lore-backend/lore-backend
            dist: npm run dist:linux
            artifacts: |
              desktop/dist/*.AppImage
              desktop/dist/*.deb
              desktop/dist/latest-linux.yml
            release_files: ''
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Freeze the Python backend (PyInstaller)
        working-directory: core
        shell: bash
        env:
          PYTHON: python   # the freeze scripts default to the repo venv; CI uses setup-python
        run: |
          pip install -e ".[local]" pyinstaller
          ${{ matrix.freeze }}

      - name: Smoke-boot the frozen backend
        working-directory: core
        shell: bash
        run: |
          DATABASE_URL="sqlite:///$RUNNER_TEMP/t.db" QDRANT_PATH="$RUNNER_TEMP/q" LORE_PORT=8210 \
            ${{ matrix.backend_bin }} &
          BACKEND_PID=$!
          for i in $(seq 1 40); do
            if curl -sf http://localhost:8210/presets > /dev/null; then
              kill $BACKEND_PID || true
              exit 0
            fi
            sleep 2
          done
          echo "frozen backend did not boot" && exit 1

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install desktop deps
        working-directory: desktop
        shell: bash
        run: npm ci || npm install

      - name: Configure signing env (only when secrets exist)
        # electron-builder treats an EMPTY CSC_LINK as "signing configured" and
        # tries to load it as a cert file ("not a file" — first-run failure mode).
        # Empty env var != unset env var: export only non-empty secrets.
        shell: bash
        env:
          MAC_CSC: ${{ secrets.CSC_LINK }}
          MAC_CSC_PW: ${{ secrets.CSC_KEY_PASSWORD }}
          WIN_CSC: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_PW: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          AP_ID: ${{ secrets.APPLE_ID }}
          AP_PW: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          AP_TEAM: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            [ -n "$WIN_CSC" ] && echo "CSC_LINK=$WIN_CSC" >> "$GITHUB_ENV"
            [ -n "$WIN_CSC_PW" ] && echo "CSC_KEY_PASSWORD=$WIN_CSC_PW" >> "$GITHUB_ENV"
          else
            [ -n "$MAC_CSC" ] && echo "CSC_LINK=$MAC_CSC" >> "$GITHUB_ENV"
            [ -n "$MAC_CSC_PW" ] && echo "CSC_KEY_PASSWORD=$MAC_CSC_PW" >> "$GITHUB_ENV"
            [ -n "$AP_ID" ] && echo "APPLE_ID=$AP_ID" >> "$GITHUB_ENV"
            [ -n "$AP_PW" ] && echo "APPLE_APP_SPECIFIC_PASSWORD=$AP_PW" >> "$GITHUB_ENV"
            [ -n "$AP_TEAM" ] && echo "APPLE_TEAM_ID=$AP_TEAM" >> "$GITHUB_ENV"
          fi
          echo "signing env configured (empty secrets skipped)"

      - name: Build installer (electron-builder)
        working-directory: desktop
        shell: bash
        run: ${{ matrix.dist }} -- --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: lore-${{ matrix.os }}
          path: ${{ matrix.artifacts }}
          if-no-files-found: warn

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/') && matrix.release_files != ''
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.release_files }}
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
