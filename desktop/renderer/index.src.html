<!-- Content-Security-Policy. All runtime libraries are now vendored locally under
     renderer/vendor/ (no CDN fetch) — this closes the CDN/MITM supply-chain RCE.
     'unsafe-eval'/'unsafe-inline' remain ONLY because JSX is compiled in-browser by
     the (now-local) @babel/standalone; with no remote script source and connect-src
     locked to localhost there is no injection/exfiltration path. Dropping unsafe-eval
     entirely requires precompiling JSX at build time (tracked as a follow-up). -->
<meta http-equiv="Content-Security-Policy" content="
  default-src 'self';
  script-src 'self' 'unsafe-inline' 'unsafe-eval';
  style-src 'self' 'unsafe-inline';
  img-src 'self' data: blob:;
  font-src 'self' data:;
  connect-src 'self' http://localhost:* http://127.0.0.1:*;
  object-src 'none';
  base-uri 'self';
  form-action 'none';
  frame-src 'none';
">
